{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <h2 class="mb-4 fw-bold">User Management</h2>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body bg-light">
            <h5 class="mb-3">Add New System User</h5>
            <form action="/add_user" method="POST" class="row g-3">
                <div class="col-md-4"><input type="text" name="username" class="form-control" placeholder="Username" required></div>
                <div class="col-md-3"><input type="password" name="password" class="form-control" placeholder="Password" required></div>
                <div class="col-md-3">
                    <select name="role" class="form-select">
                        <option value="DRIVER">Driver</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>
                <div class="col-md-2"><button type="submit" class="btn btn-success w-100">Add User</button></div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
                <tr><th>Username</th><th>Role</th><th>Status</th></tr>
            </thead>
            <tbody>
                {% for u in users %}
                <tr>
                    <td><strong>{{ u.username }}</strong></td>
                    <td><span class="badge {{ 'bg-primary' if u.role == 'ADMIN' else 'bg-secondary' }}">{{ u.role }}</span></td>
                    <td><span class="text-success">● Active</span></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
