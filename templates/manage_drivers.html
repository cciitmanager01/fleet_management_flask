{% extends "base.html" %}
{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Driver Registry</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addDriverModal">
            <i class="material-icons align-middle">person_add</i> Add New Driver
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">Driver Name</th>
                        <th>Employee ID</th>
                        <th>Status</th>
                        <th class="text-end pe-4">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for d in drivers %}
                    <tr>
                        <td class="ps-4 fw-bold">{{ d.name }}</td>
                        <td>{{ d.employee_id or 'N/A' }}</td>
                        <td><span class="badge bg-success-subtle text-success">Active</span></td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#editModal{{d.id}}">Edit</button>
                            <a href="/delete_driver/{{d.id}}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete driver?')">Delete</a>
                        </td>
                    </tr>

                    <!-- Edit Modal -->
                    <div class="modal fade" id="editModal{{d.id}}" tabindex="-1">
                        <div class="modal-dialog">
                            <form action="/edit_driver/{{d.id}}" method="POST" class="modal-content">
                                <div class="modal-header"><h5>Edit Driver</h5></div>
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label">Full Name</label>
                                        <input type="text" name="name" class="form-control" value="{{d.name}}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Employee ID</label>
                                        <input type="text" name="employee_id" class="form-control" value="{{d.employee_id}}">
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                                    <button type="submit" class="btn btn-primary">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Driver Modal -->
<div class="modal fade" id="addDriverModal" tabindex="-1">
    <div class="modal-dialog">
        <form action="/add_driver" method="POST" class="modal-content">
            <div class="modal-header"><h5 class="fw-bold">Register New Driver</h5></div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Employee ID</label>
                    <input type="text" name="employee_id" class="form-control" placeholder="CCI-2025-001">
                </div>
            </div>
            <div class="modal-footer">
                <button type="submit" class="btn btn-primary w-100">Save Driver</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
