{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="text-center fw-bold mb-4">Daily Odometer Log</h3>

                <form action="/submit_mileage" method="POST">
                    <!-- NEW: Driver Name Field -->
                    <!-- Inside index.html form -->
<div class="mb-3">
    <label class="form-label fw-bold">Select Driver Name</label>
    <select name="driver_id" class="form-select form-select-lg" required>
        <option value="">-- Who is driving? --</option>
        {% for d in drivers %}
        <option value="{{ d.id }}">{{ d.name }}</option>
        {% endfor %}
    </select>
</div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Unit ID (Plate Number)</label>
                        <select name="vehicle_id" class="form-select form-select-lg" required>
                            <option value="">-- Select Vehicle --</option>
                            {% for v in vehicles %}
                            <option value="{{ v.id }}">{{ v.plate_number }} ({{ v.department }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Current Odometer Reading (KM)</label>
                        <input type="number" name="odometer" class="form-control form-control-lg"
                               placeholder="e.g. 340110" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow-sm">Submit Log</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
